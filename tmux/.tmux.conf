# Set true color for Neovim/LazyVim
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on
set -s set-clipboard on
set-option -g default-shell /usr/bin/zsh

# Set prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# ---------------------------------------------------------
# NEW: Vim style navigation and copy/paste in Tmux
# ---------------------------------------------------------
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---------------------------------------------------------
# Plugins
# ---------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank' # NEW: System clipboard support

# NEW: Catppuccin Theme for a beautiful status bar
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha' # Options: latte, frappe, macchiato, mocha

# Auto-restore sessions
set -g @continuum-restore 'on'

set -g @plugin 'alexwforsythe/tmux-which-key'

# Run TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
